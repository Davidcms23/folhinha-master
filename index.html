<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masterizando a Folhinha</title>
  <meta name="description" content="Trilha de 30 dias de flashcards para memorizar distribuições de probabilidade no Anki." />
  <link rel="stylesheet" href="style.css" />

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      },
      startup: {
        ready() { MathJax.startup.defaultReady(); }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" defer></script>
</head>
<body>

  <!-- ── Navbar ───────────────────────────────── -->
  <nav class="navbar" role="navigation" aria-label="Principal">
    <a href="index.html" class="nav-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true">
        <path d="M3 3v18h18"/>
        <path d="M7 16l4-4 4 4 4-6"/>
      </svg>
      ProbPath
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Início</a>
      <a href="about.html" class="nav-link">Sobre</a>
      <a href="anki-setup.html" class="nav-link">Baralho</a>
    </div>
  </nav>

  <!-- ── Main ─────────────────────────────────── -->
  <main class="main">
    <h1 class="page-title">Folhinha Master</h1>

    <!-- Progress -->
    <div class="progress-row">
      <span class="progress-label" id="prog-label">Progresso: Dia 1 de 3*</span>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Days grid -->
    <div class="days-grid" id="days-grid" role="list" aria-label="Dias da trilha"></div>

    <!-- Card panel -->
    <section class="panel" id="panel" aria-live="polite">
      <div class="panel-header">
        <div class="panel-title-row">
          <span class="panel-title" id="panel-title">—</span>
          <span class="tag" id="panel-tag"></span>
        </div>
        <div class="panel-nav">
          <span class="card-counter" id="card-counter" aria-label="Card atual"></span>
          <button class="nav-btn" id="btn-prev" onclick="prevCard()" aria-label="Card anterior">&#8249;</button>
          <button class="nav-btn" id="btn-next" onclick="nextCard()" aria-label="Próximo card">&#8250;</button>
        </div>
      </div>

      <div class="card-body">
        <div class="card-side">
          <div class="side-label">
            <span class="dot" aria-hidden="true"></span> Front
          </div>
          <div class="card-question" id="card-q"></div>
        </div>
        <div class="card-side">
          <div class="side-label">
            <span class="dot green" aria-hidden="true"></span> Back
          </div>
          <div class="card-answer" id="card-a"></div>
        </div>
      </div>

      <div class="card-footer">
        <div class="copy-grp">
          <button class="copy-btn" id="btn-copy-anki" onclick="copyAnki(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy Anki text (LaTeX included)
          </button>
          <button class="copy-btn" id="btn-copy-latex" onclick="copyLatex(this)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
            LaTeX only
          </button>
        </div>
        <button class="done-btn" id="done-btn" onclick="markDone()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
          Mark day as done
        </button>
      </div>
    </section>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state" role="status">
      ← Clique em um dia para ver os cards
    </div>
  </main>

  <!-- ── Footer ───────────────────────────────── -->
  <footer class="site-footer">
    <p>
      Repository
      <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
      &nbsp;·&nbsp; Copyright &copy; 2025
    </p>
  </footer>

  <script src="cards.js"></script>
  <script src="app.js"></script>
</body>
</html>
